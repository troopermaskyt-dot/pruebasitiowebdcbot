<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoBot Studio - Bot con IA + Imágenes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .section { display: none; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">

  <!-- Welcome + Discord Login -->
  <div id="welcomeScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-950 to-black">
    <div class="text-center max-w-md">
      <h1 class="text-6xl font-bold mb-3">NeoBot Studio</h1>
      <p class="text-xl text-purple-300 mb-10">Tu bot de Discord con IA + Generación de Imágenes</p>
      <button onclick="startOnboarding()" class="w-full bg-[#5865F2] py-5 rounded-3xl text-xl font-semibold flex items-center justify-center gap-4">
        <i class="fab fa-discord text-3xl"></i> Iniciar con Discord
      </button>
    </div>
  </div>

  <!-- Onboarding -->
  <div id="onboarding" class="hidden min-h-screen bg-gray-950 py-12">
    <div class="max-w-2xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-10">Configura tu Bot</h2>
      
      <div class="space-y-10">
        <!-- Pasos -->
        <div class="flex gap-6">
          <div class="shrink-0 w-10 h-10 bg-purple-600 rounded-2xl flex items-center justify-center font-bold">1</div>
          <div><strong>Ve al Discord Developer Portal</strong><br><a href="https://discord.com/developers/applications" target="_blank" class="text-blue-400">discord.com/developers</a></div>
        </div>
        <div class="flex gap-6">
          <div class="shrink-0 w-10 h-10 bg-purple-600 rounded-2xl flex items-center justify-center font-bold">2</div>
          <div><strong>Crea Nueva Aplicación → Bot → Copia el Token</strong></div>
        </div>
      </div>

      <div class="mt-12 bg-gray-900 rounded-3xl p-8">
        <input id="botToken" type="password" placeholder="Pega aquí tu Token de Discord" class="w-full bg-black border border-gray-700 rounded-2xl px-6 py-5">
        <button onclick="connectBot()" class="mt-6 w-full bg-emerald-600 py-5 rounded-3xl text-lg font-semibold">Conectar Bot → Entrar al Panel</button>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div id="mainPanel" class="hidden flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-black border-r border-gray-800 p-6 flex flex-col">
      <h1 class="text-3xl font-bold mb-8">NeoBot</h1>
      <nav class="flex-1 space-y-2">
        <button onclick="showSection('ia-engine')" class="w-full text-left px-5 py-4 rounded-2xl hover:bg-gray-900 flex items-center gap-3">🤖 IA Engine</button>
        <button onclick="showSection('personality')" class="w-full text-left px-5 py-4 rounded-2xl hover:bg-gray-900 flex items-center gap-3">👤 Personalidad</button>
        <button onclick="showSection('commands')" class="w-full text-left px-5 py-4 rounded-2xl hover:bg-gray-900 flex items-center gap-3">🧩 Creador de Comandos</button>
      </nav>
    </div>

    <!-- IA Engine (Chat + Imágenes) -->
    <div id="ia-engine" class="section flex-1 p-8 overflow-auto">
      <h2 class="text-3xl font-bold mb-8">IA Engine</h2>
      
      <div class="grid grid-cols-2 gap-8">
        <!-- Chat -->
        <div>
          <h3 class="text-xl mb-4">Chat con IA</h3>
          <div id="chatMessages" class="bg-gray-900 h-96 rounded-3xl p-6 overflow-auto mb-4"></div>
          <div class="flex gap-3">
            <input id="chatInput" class="flex-1 bg-gray-900 rounded-3xl px-6 py-4" placeholder="Escribe un mensaje...">
            <button onclick="sendChatMessage()" class="bg-purple-600 px-8 rounded-3xl">Enviar</button>
          </div>
        </div>

        <!-- Generador de Imágenes -->
        <div>
          <h3 class="text-xl mb-4">Generador de Imágenes</h3>
          <div class="bg-gray-900 rounded-3xl p-6">
            <input id="imagePrompt" class="w-full bg-gray-800 rounded-2xl px-6 py-4 mb-4" placeholder="Describe la imagen que quieres crear...">
            <button onclick="generateImage()" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 py-4 rounded-2xl font-semibold">Generar Imagen</button>
            
            <div id="imageResult" class="mt-6 hidden">
              <img id="generatedImage" class="w-full rounded-3xl" alt="Imagen generada">
              <button onclick="downloadImage()" class="mt-4 text-sm underline">Descargar Imagen</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Otras secciones -->
    <div id="personality" class="section hidden flex-1 p-8">...</div>
    <div id="commands" class="section hidden flex-1 p-8">...</div>
  </div>

  <script>
    function startOnboarding() {
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('onboarding').classList.remove('hidden');
    }

    function connectBot() {
      const token = document.getElementById('botToken').value.trim();
      if (!token) return alert("Ingresa tu token");
      
      document.getElementById('onboarding').classList.add('hidden');
      document.getElementById('mainPanel').classList.remove('hidden');
      showSection('ia-engine');
    }

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    // Chat
    function sendChatMessage() {
      const input = document.getElementById('chatInput');
      const messages = document.getElementById('chatMessages');
      if (!input.value) return;

      messages.innerHTML += `<div class="text-right mb-4"><span class="bg-purple-600 px-5 py-3 rounded-3xl">${input.value}</span></div>`;
      
      setTimeout(() => {
        messages.innerHTML += `<div class="mb-4"><span class="bg-gray-800 px-5 py-3 rounded-3xl">¡Claro! ¿Quieres que genere una imagen también?</span></div>`;
        messages.scrollTop = messages.scrollHeight;
      }, 700);
      input.value = '';
    }

    // Generación de Imágenes (Simulada)
    function generateImage() {
      const prompt = document.getElementById('imagePrompt').value.trim();
      if (!prompt) return alert("Describe la imagen");

      const resultDiv = document.getElementById('imageResult');
      const img = document.getElementById('generatedImage');

      resultDiv.classList.remove('hidden');
      img.src = `https://picsum.photos/seed/${prompt.length}/800/600`; // Imagen aleatoria simulada

      alert("Imagen generada (simulación)\n\nEn producción usaría Grok Imagine, Flux, Midjourney, etc.");
    }

    function downloadImage() {
      alert("Imagen descargada (simulación)");
    }
  </script>
</body>
</html>
